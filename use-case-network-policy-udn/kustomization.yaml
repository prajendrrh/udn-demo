# NetworkPolicy with UDN: one namespace, one UDN. Default-deny all ingress; then allow only client→server on 9376.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - udn-demo.yaml
  - deployment-server.yaml
  - deployment-client.yaml
  - network-policy-deny-all-ingress.yaml
  - network-policy-allow-from-b.yaml
